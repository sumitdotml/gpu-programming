  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {

  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);

}

.form-range:focus-visible::-moz-range-thumb {

}

.form-range:disabled {

  opacity: 0.4;
}

    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],

  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {

}

svg {

  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {

}

html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;column-major-walkthrough&quot;&gt;
  &lt;style&gt;
    #column-major-walkthrough {
      --cm-gap: 12px;
      color: var(--foreground);
      display: grid;
      gap: 18px;
      width: 100%;
    }

    #column-major-walkthrough * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    #column-major-walkthrough .cm-status {
      display: grid;
      gap: 4px;
      min-height: 72px;
    }

    #column-major-walkthrough .cm-step {
      color: var(--muted-foreground);
    }

    #column-major-walkthrough .cm-title {
      font-weight: 500;
    }

    #column-major-walkthrough .cm-detail {
      color: var(--muted-foreground);
    }

    #column-major-walkthrough .cm-stage {
      display: grid;
      gap: 16px;
    }

    #column-major-walkthrough .cm-label-row {
      align-items: center;
      color: var(--muted-foreground);
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    #column-major-walkthrough .cm-matrix {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    #column-major-walkthrough .cm-column {
      display: grid;
      gap: 4px;
      grid-template-rows: auto 34px 68px 34px 48px;
      min-width: 0;
    }

    #column-major-walkthrough .cm-column-label {
      color: var(--muted-foreground);
      text-align: center;
    }

    #column-major-walkthrough .cm-cell {
      align-items: center;
      background: color-mix(in srgb, var(--muted) 72%, transparent);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted-foreground);
      display: flex;
      justify-content: center;
      min-width: 0;
      overflow-wrap: anywhere;
      padding: 4px;
      text-align: center;
      transition: background-color 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease;
    }

    #column-major-walkthrough .cm-cell.is-visited {
      background: color-mix(in srgb, var(--viz-series-1) 18%, var(--card));
      border-color: color-mix(in srgb, var(--viz-series-1) 48%, var(--border));
      color: var(--foreground);
    }

    #column-major-walkthrough .cm-cell.is-active {
      background: color-mix(in srgb, var(--viz-series-2) 28%, var(--card));
      border-color: var(--viz-series-2);
      color: var(--foreground);
      transform: translateY(-2px);
    }

    #column-major-walkthrough .cm-cell.is-target {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--primary-foreground);
      transform: translateY(-2px);
    }

    #column-major-walkthrough .cm-memory {
      display: grid;
      gap: 6px;
      grid-template-columns: 1fr 1.5fr 1fr 1.25fr 0.72fr;
    }

    #column-major-walkthrough .cm-memory-segment {
      align-items: center;
      border-bottom: 4px solid var(--border);
      color: var(--muted-foreground);
      display: flex;
      justify-content: center;
      min-height: 54px;
      min-width: 0;
      overflow-wrap: anywhere;
      padding: 6px 2px;
      text-align: center;
      transition: border-color 180ms ease, color 180ms ease;
    }

    #column-major-walkthrough .cm-memory-segment.is-visited {
      border-color: var(--viz-series-1);
      color: var(--foreground);
    }

    #column-major-walkthrough .cm-memory-segment.is-active {
      border-color: var(--viz-series-2);
      color: var(--foreground);
    }

    #column-major-walkthrough .cm-memory-segment.is-target {
      border-color: var(--primary);
      color: var(--foreground);
      font-weight: 500;
    }

    #column-major-walkthrough .cm-controls {
      align-items: center;
      display: flex;
      gap: 8px;
      justify-content: space-between;
    }

    #column-major-walkthrough .cm-progress {
      color: var(--muted-foreground);
      text-align: center;
    }

    #column-major-walkthrough .cm-button {
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--secondary-foreground);
      min-height: 38px;
      padding: 8px 14px;
    }

    #column-major-walkthrough .cm-button.cm-next {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--primary-foreground);
    }

    #column-major-walkthrough .cm-button:disabled {
      opacity: 0.45;
    }

    @media (max-width: 520px) {
      #column-major-walkthrough {
        --cm-gap: 8px;
        gap: 14px;
      }

      #column-major-walkthrough .cm-matrix {
        gap: 4px;
      }

      #column-major-walkthrough .cm-column {
        gap: 3px;
        grid-template-rows: auto 32px 62px 32px 44px;
      }

      #column-major-walkthrough .cm-cell {
        padding: 2px;
      }

      #column-major-walkthrough .cm-memory {
        gap: 3px;
      }

      #column-major-walkthrough .cm-memory-segment {
        padding-inline: 1px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #column-major-walkthrough .cm-cell,
      #column-major-walkthrough .cm-memory-segment {
        transition: none;
      }
    }
  &lt;/style&gt;

  &lt;div class=&quot;cm-status&quot; aria-live=&quot;polite&quot;&gt;
    &lt;span class=&quot;cm-step text-small&quot; id=&quot;cm-step-number&quot;&gt;&lt;/span&gt;
    &lt;span class=&quot;cm-title&quot; id=&quot;cm-step-title&quot;&gt;&lt;/span&gt;
    &lt;span class=&quot;cm-detail text-small&quot; id=&quot;cm-step-detail&quot;&gt;&lt;/span&gt;
  &lt;/div&gt;

  &lt;div class=&quot;cm-stage&quot;&gt;
    &lt;div class=&quot;cm-label-row text-small&quot;&gt;
      &lt;span&gt;500 rows&lt;/span&gt;
      &lt;span&gt;target (row 20, column 10)&lt;/span&gt;
      &lt;span&gt;400 columns&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;cm-matrix&quot; id=&quot;cm-matrix&quot; aria-label=&quot;Compressed matrix showing column-major traversal&quot;&gt;&lt;/div&gt;

    &lt;div class=&quot;cm-label-row text-small&quot;&gt;
      &lt;span&gt;Linear memory&lt;/span&gt;
      &lt;span&gt;increasing index →&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;cm-memory&quot; id=&quot;cm-memory&quot; aria-label=&quot;Column-major memory ranges&quot;&gt;&lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;cm-controls&quot;&gt;
    &lt;button class=&quot;cm-button&quot; id=&quot;cm-previous&quot; type=&quot;button&quot;&gt;Previous&lt;/button&gt;
    &lt;span class=&quot;cm-progress text-small&quot; id=&quot;cm-progress&quot;&gt;&lt;/span&gt;
    &lt;button class=&quot;cm-button cm-next&quot; id=&quot;cm-next&quot; type=&quot;button&quot;&gt;Next&lt;/button&gt;
  &lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&quot;column-major-walkthrough&quot;);
      const matrix = root.querySelector(&quot;#cm-matrix&quot;);
      const memory = root.querySelector(&quot;#cm-memory&quot;);
      const previous = root.querySelector(&quot;#cm-previous&quot;);
      const next = root.querySelector(&quot;#cm-next&quot;);
      const stepNumber = root.querySelector(&quot;#cm-step-number&quot;);
      const stepTitle = root.querySelector(&quot;#cm-step-title&quot;);
      const stepDetail = root.querySelector(&quot;#cm-step-detail&quot;);
      const progress = root.querySelector(&quot;#cm-progress&quot;);

      const steps = [
        {
          title: &quot;Start at the first element&quot;,
          detail: &quot;Memory index 0 is row 0, column 0.&quot;
        },
        {
          title: &quot;Finish column 0 before column 1&quot;,
          detail: &quot;One complete column contains 500 elements: indices 0–499.&quot;
        },
        {
          title: &quot;Pass 10 complete columns&quot;,
          detail: &quot;Columns 0–9 contain 5,000 elements. Column 10 starts at index 5000.&quot;
        },
        {
          title: &quot;Move down inside column 10&quot;,
          detail: &quot;Rows 0–19 of column 10 occupy indices 5000–5019.&quot;
        },
        {
          title: &quot;Arrive at the target&quot;,
          detail: &quot;Row 20, column 10 is stored at index 5020.&quot;
        }
      ];

      const columns = [
        { label: &quot;c0&quot;, role: &quot;first&quot; },
        { label: &quot;c1&quot;, role: &quot;before&quot; },
        { label: &quot;c2&quot;, role: &quot;before&quot; },
        { label: &quot;c3–8&quot;, role: &quot;before&quot; },
        { label: &quot;c9&quot;, role: &quot;before&quot; },
        { label: &quot;c10&quot;, role: &quot;target&quot; }
      ];

      const rowGroups = [
        { label: &quot;r0&quot;, role: &quot;row-0&quot; },
        { label: &quot;r1–19&quot;, role: &quot;rows-1-19&quot; },
        { label: &quot;r20&quot;, role: &quot;row-20&quot; },
        { label: &quot;r21–499&quot;, role: &quot;after&quot; }
      ];

      const memorySegments = [
        { label: &quot;c0\n0–499&quot;, role: &quot;column-0&quot; },
        { label: &quot;c1–8\n500–4499&quot;, role: &quot;columns-1-8&quot; },
        { label: &quot;c9\n4500–4999&quot;, role: &quot;column-9&quot; },
        { label: &quot;c10 r0–19\n5000–5019&quot;, role: &quot;target-prefix&quot; },
        { label: &quot;r20\n5020&quot;, role: &quot;target&quot; }
      ];

      columns.forEach((column) =&gt; {
        const track = document.createElement(&quot;div&quot;);
        track.className = &quot;cm-column&quot;;
        track.dataset.columnRole = column.role;

        const label = document.createElement(&quot;span&quot;);
        label.className = &quot;cm-column-label text-small&quot;;
        label.textContent = column.label;
        track.appendChild(label);

        rowGroups.forEach((row) =&gt; {
          const cell = document.createElement(&quot;div&quot;);
          cell.className = &quot;cm-cell text-small&quot;;
          cell.dataset.rowRole = row.role;
          cell.textContent = row.label;
          track.appendChild(cell);
        });

        matrix.appendChild(track);
      });

      memorySegments.forEach((segment) =&gt; {
        const item = document.createElement(&quot;div&quot;);
        item.className = &quot;cm-memory-segment text-small&quot;;
        item.dataset.memoryRole = segment.role;
        item.textContent = segment.label;
        memory.appendChild(item);
      });

      let currentStep = 0;

      const clearStates = () =&gt; {
        root.querySelectorAll(&quot;.is-visited, .is-active, .is-target&quot;).forEach((element) =&gt; {
          element.classList.remove(&quot;is-visited&quot;, &quot;is-active&quot;, &quot;is-target&quot;);
        });
      };

      const markColumn = (role, className) =&gt; {
        root.querySelectorAll(`[data-column-role=&quot;${role}&quot;] .cm-cell`).forEach((cell) =&gt; {
          cell.classList.add(className);
        });
      };

      const markMemory = (role, className) =&gt; {
        root.querySelector(`[data-memory-role=&quot;${role}&quot;]`).classList.add(className);
      };

      const render = () =&gt; {
        clearStates();
        const step = steps[currentStep];
        stepNumber.textContent = `Step ${currentStep + 1} of ${steps.length}`;
        stepTitle.textContent = step.title;
        stepDetail.textContent = step.detail;
        progress.textContent = `${currentStep + 1} / ${steps.length}`;
        previous.disabled = currentStep === 0;
        next.disabled = currentStep === steps.length - 1;

        if (currentStep === 0) {
          root.querySelector(&#x27;[data-column-role=&quot;first&quot;] [data-row-role=&quot;row-0&quot;]&#x27;).classList.add(&quot;is-active&quot;);
        }

        if (currentStep &gt;= 1) {
          markColumn(&quot;first&quot;, &quot;is-visited&quot;);
          markMemory(&quot;column-0&quot;, &quot;is-visited&quot;);
        }

        if (currentStep &gt;= 2) {
          [&quot;before&quot;].forEach((role) =&gt; markColumn(role, &quot;is-visited&quot;));
          markMemory(&quot;columns-1-8&quot;, &quot;is-visited&quot;);
          markMemory(&quot;column-9&quot;, &quot;is-visited&quot;);
          root.querySelector(&#x27;[data-column-role=&quot;target&quot;] [data-row-role=&quot;row-0&quot;]&#x27;).classList.add(&quot;is-active&quot;);
        }

        if (currentStep &gt;= 3) {
          root.querySelectorAll(&#x27;[data-column-role=&quot;target&quot;] [data-row-role=&quot;row-0&quot;], [data-column-role=&quot;target&quot;] [data-row-role=&quot;rows-1-19&quot;]&#x27;).forEach((cell) =&gt; {
            cell.classList.remove(&quot;is-active&quot;);
            cell.classList.add(&quot;is-visited&quot;);
          });
          markMemory(&quot;target-prefix&quot;, currentStep === 3 ? &quot;is-active&quot; : &quot;is-visited&quot;);
        }

        if (currentStep === 4) {
          root.querySelector(&#x27;[data-column-role=&quot;target&quot;] [data-row-role=&quot;row-20&quot;]&#x27;).classList.add(&quot;is-target&quot;);
          markMemory(&quot;target&quot;, &quot;is-target&quot;);
        }
      };

      previous.addEventListener(&quot;click&quot;, () =&gt; {
        currentStep = Math.max(0, currentStep - 1);
        render();
      });

      next.addEventListener(&quot;click&quot;, () =&gt; {
        currentStep = Math.min(steps.length - 1, currentStep + 1);
        render();
      });

      render();
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });

  if (globalThis.lucide != null) {
    initialize();
